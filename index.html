<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦</title>

  <!-- OpenGraph / Embed -->
  <meta property="og:title" content="✦">
  <meta property="og:description" content="kolmogorov, code, and coffee">
  <meta property="og:image" content="https://www.axaxaxaxaxaxa.org/assets/limitorderbookfinal.png">
  <meta property="og:url" content="https://www.axaxaxaxaxaxa.org">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="✦">
  <meta name="twitter:description" content="kolmogorov, code, and coffee">
  <meta name="twitter:image" content="https://www.axaxaxaxaxaxa.org/assets/limitorderbookfinal.png">
  <meta name="description" content="kolmogorov, code, and coffee">
  <meta name="theme-color" content="#0a0408">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'MS Gothic', 'MS ゴシック', 'Noto Sans JP', monospace;
      background: #0a0408;
      color: #c8c4c8;
      display: flex;
      min-height: 100vh;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .about {
      position: relative;
      z-index: 2;
      width: 900px;
      height: 100%;
      padding: 80px 70px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(90deg, #0a0408 0%, #0a0408 50%, rgba(10,4,8,0.95) 65%, rgba(10,4,8,0.7) 78%, transparent 100%);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .name {
      font-size: 74px;
      color: #b8a8b8;
      line-height: 1.3;
    }

    .links {
      margin-top: 0;
    }

    .links a {
      display: block;
      font-size: 63px;
      color: #7a6a78;
      text-decoration: none;
      margin-bottom: 28px;
      letter-spacing: 0.02em;
      transition: color 0.3s ease;
    }

    .links a:hover {
      color: #b0a0b0;
    }

    .lang {
      font-size: 53px;
      color: #6a5a68;
    }

    .lang a {
      color: #4a4048;
      text-decoration: none;
      transition: color 0.3s ease;
      cursor: pointer;
    }

    .lang a:hover {
      color: #9a8a9a;
    }

    .lang a.active {
      color: #9a8a9a;
    }

    .visual {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: #0a0408;
    }

    .img-main {
      position: absolute;
      top: 0;
      left: 25%;
      width: 50%;
      bottom: 0;
      background: url('assets/limitorderbookfinal.png') no-repeat right center;
      background-size: auto 130%;
    }

    .img-mirror {
      position: absolute;
      top: 0;
      left: 75%;
      right: 0;
      bottom: 0;
      background: url('assets/limitorderbookfinal.png') no-repeat right center;
      background-size: auto 130%;
      transform: scaleX(-1);
      opacity: 0.7;
    }

    .visual-gradient {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, #0a0408 0%, #0a0408 30%, rgba(10,4,8,0.95) 42%, rgba(10,4,8,0.7) 55%, rgba(10,4,8,0.3) 70%, transparent 85%);
      pointer-events: none;
    }

    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      pointer-events: none;
      z-index: 1;
      mask-image: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 20%, transparent 50%);
      -webkit-mask-image: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 20%, transparent 50%);
    }

    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <aside class="about">
      <div class="name" data-en="kolmogorov, code, and coffee" data-ru="колмогоров, код и кофе">kolmogorov, code, and coffee</div>
      <div class="links">
        <a href="https://github.com/xaxaxaxaxaxaxaxaxaxax" data-en="github" data-ru="github">github</a>
        <a href="#" data-en="papers" data-ru="статьи">papers</a>
        <a href="mailto:tworsquared@proton.me" data-en="contact" data-ru="контакт">contact</a>
      </div>
      <div class="lang">
        <a id="lang-en" class="active">english</a> / <a id="lang-ru">russian</a>
      </div>
    </aside>
    <main class="visual">
      <div class="img-mirror"></div>
      <div class="img-main"></div>
      <div class="visual-gradient"></div>
      <div class="scanlines"></div>
    </main>
  </div>
  <script>
    const langEn = document.getElementById('lang-en');
    const langRu = document.getElementById('lang-ru');
    const translatables = document.querySelectorAll('[data-en]');

    function setLang(lang) {
      translatables.forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
      });
      if (lang === 'en') {
        langEn.classList.add('active');
        langRu.classList.remove('active');
        document.documentElement.lang = 'en';
      } else {
        langRu.classList.add('active');
        langEn.classList.remove('active');
        document.documentElement.lang = 'ru';
      }
    }

    langEn.addEventListener('click', () => setLang('en'));
    langRu.addEventListener('click', () => setLang('ru'));

  </script>
</body>
</html>
