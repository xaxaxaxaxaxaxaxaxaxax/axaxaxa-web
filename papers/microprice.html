<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Microprice as a Martingale Corrector</title>
  <meta name="description" content="A Unified Markov-Operator Framework for Fair Value and Value-Function Extensions — Lev Petersen">
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111" media="(prefers-color-scheme: dark)">
  <style>
    :root {
      --bg: #fafafa;
      --text: #111;
      --dim: #666;
      --faint: #999;
      --rule: #e0e0e0;
      --mono: "Berkeley Mono", "IBM Plex Mono", "JetBrains Mono", "SF Mono", ui-monospace, monospace;
      --body: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --ease: cubic-bezier(.22, .61, .36, 1)
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --text: #ddd;
        --dim: #999;
        --faint: #666;
        --rule: #282828
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    html {
      font-size: 17px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility
    }
    html, body { height: 100%; overflow: hidden }
    body {
      font-family: var(--body);
      color: var(--text);
      background: var(--bg)
    }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1rem, 3vw, 2.5rem);
      z-index: 10
    }
    .topbar a {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--faint);
      text-decoration: none;
      letter-spacing: .03em;
      transition: color .15s var(--ease);
      white-space: nowrap
    }
    .topbar a:hover { color: var(--text) }
    .topbar .title {
      font-size: .9rem;
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 1.5rem;
      flex: 1;
      text-align: center
    }
    .pdf-wrap {
      position: fixed;
      top: 48px;
      left: 0; right: 0; bottom: 0;
      background: var(--bg)
    }
    .pdf-wrap embed {
      width: 100%;
      height: 100%;
      border: none
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html">&larr; axaxaxaxa.org</a>
    <span class="title">Microprice as a Martingale Corrector &mdash; Petersen (preprint)</span>
    <a href="../assets/microprice.pdf" download>download</a>
  </div>
  <div class="pdf-wrap">
    <embed src="../assets/microprice.pdf#toolbar=0&navpanes=0&view=FitH" type="application/pdf">
  </div>
</body>
</html>
