<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Microprice as a Centered Poisson Corrector</title>
  <meta name="description" content="Microprice as a Centered Poisson Corrector — Lev Petersen">
  <meta name="theme-color" content="#f4f1ec" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111" media="(prefers-color-scheme: dark)">
  <style>
    :root {
      --bg: #f4f1ec;
      --text: #1a1a1a;
      --dim: #666;
      --faint: #999;
      --rule: #e0e0e0;
      --accent: #0055ff;
      --accent-dim: #0044cc;
      --mono: "Berkeley Mono", "IBM Plex Mono", "JetBrains Mono", "SF Mono", ui-monospace, monospace;
      --body: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --ease: cubic-bezier(.22, .61, .36, 1)
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #111;
        --text: #ddd;
        --dim: #999;
        --faint: #666;
        --rule: #282828;
        --accent: #4d9fff;
        --accent-dim: #6ab0ff
      }
    }
    :root[data-theme="dark"] {
      --bg: #111;
      --text: #ddd;
      --dim: #999;
      --faint: #666;
      --rule: #282828;
      --accent: #4d9fff;
      --accent-dim: #6ab0ff
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    html { font-size: 17px; line-height: 1.7; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility }
    body {
      font-family: var(--body);
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }
    * { scrollbar-width: thin; scrollbar-color: var(--rule) transparent }
    ::-webkit-scrollbar { width: 6px; height: 6px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px }
    a { color: var(--accent); text-decoration: none; transition: color .15s var(--ease) }
    a:hover { color: var(--accent-dim) }
    .site-header { flex-shrink: 0; padding: 1.75rem 2rem 0; background: var(--bg); z-index: 10 }
    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: .6rem
    }
    .header-left { display: flex; align-items: baseline; gap: .75rem; min-width: 0 }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; white-space: nowrap }
    h1 a { color: var(--text) }
    h1 a:hover { color: var(--accent) }
    .role { font-family: var(--mono); font-size: .68rem; color: var(--faint); letter-spacing: .03em; white-space: nowrap }
    .paper-meta { text-align: right; flex-shrink: 0 }
    .paper-title { font-size: .95rem; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; color: var(--text) }
    .paper-subtitle { font-family: var(--mono); font-size: .65rem; color: var(--faint); letter-spacing: .03em; margin-top: .1rem }
    nav { display: flex; align-items: center; padding-bottom: 1.25rem; border-bottom: 1px solid var(--rule) }
    nav a { font-family: var(--mono); font-size: .75rem; letter-spacing: .02em; margin-right: .75rem }
    .muted { color: var(--faint) }
    .muted:hover { color: var(--dim) }
    #theme-toggle { color: var(--faint); cursor: pointer; font-size: .9rem; transition: color .15s var(--ease); user-select: none }
    #theme-toggle:hover { color: var(--text) }
    .lang { font-family: var(--mono); font-size: .75rem }
    .lang a { color: var(--faint); text-decoration: none; cursor: pointer; transition: color .15s var(--ease) }
    .lang a.active { color: var(--text) }
    .lang a:hover { color: var(--text) }
    .pdf-region { flex: 1; min-height: 0; padding: 1.25rem 2rem 1.5rem; display: flex; flex-direction: column }
    .pdf-wrap { flex: 1; min-height: 0; position: relative; border-radius: 3px; overflow: hidden }
    .pdf-wrap embed { width: 100%; height: 100%; border: none; display: block }
    .pdf-wrap:fullscreen { border-radius: 0 }
    .pdf-wrap:-webkit-full-screen { border-radius: 0 }
    .pdf-ctrl {
      position: absolute;
      top: .75rem; right: .75rem;
      display: flex;
      align-items: center;
      gap: .15rem;
      padding: .2rem .35rem;
      background: rgba(244,241,236,.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 3px;
      border: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: .7rem;
      opacity: 0;
      transition: opacity .25s var(--ease);
      z-index: 5;
      pointer-events: none
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .pdf-ctrl { background: rgba(17,17,17,.85) }
    }
    :root[data-theme="dark"] .pdf-ctrl { background: rgba(17,17,17,.85) }
    .pdf-wrap:hover .pdf-ctrl { opacity: 1; pointer-events: auto }
    .pdf-ctrl-btn {
      background: none;
      border: none;
      padding: .15rem .3rem;
      cursor: pointer;
      color: var(--dim);
      font-size: .78rem;
      line-height: 1;
      font-family: var(--mono);
      transition: color .12s var(--ease);
      text-decoration: none;
      display: inline-flex;
      align-items: center
    }
    .pdf-ctrl-btn:hover { color: var(--text) }
    .pdf-ctrl-sep { color: var(--rule); font-size: .6rem; user-select: none; padding: 0 .05rem }
    @media (max-width: 640px) {
      body { height: auto; overflow: auto }
      .site-header { padding: 1.25rem 1.25rem 0 }
      .header-top { flex-direction: column; gap: .4rem }
      .paper-meta { text-align: left }
      .pdf-region { padding: 1rem 1.25rem 1.25rem; height: 80vh; flex: none }
      .pdf-ctrl { opacity: 1; pointer-events: auto }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="header-left">
        <h1><a href="../index.html">Lev Petersen</a></h1>
        <div class="role" data-en="qr/qd @ tower &mdash; wellington, nz" data-ru="qr/qd @ tower &mdash; веллингтон, нз">qr/qd @ tower &mdash; wellington, nz</div>
      </div>
      <div class="paper-meta">
        <div class="paper-title" data-en="Microprice as a Centered Poisson Corrector" data-ru="Микроцена как центрированный пуассоновский корректор">Microprice as a Centered Poisson Corrector</div>
        <div class="paper-subtitle" data-en="Petersen &mdash; preprint" data-ru="Петерсен &mdash; препринт">Petersen &mdash; preprint</div>
      </div>
    </div>
    <nav>
      <a href="../index.html" class="muted" data-en="&larr; back" data-ru="&larr; назад">&larr; back</a>
      <a href="../assets/microprice.pdf" download data-en="download pdf" data-ru="скачать pdf">download pdf</a>
      <span style="flex:1"></span>
      <a id="theme-toggle">&#9680;</a>
      <span style="margin-left:.75rem" class="lang">
        <a id="lang-en" class="active">en</a> /
        <a id="lang-ru">ru</a>
      </span>
    </nav>
  </header>

  <div class="pdf-region">
    <div class="pdf-wrap" id="pdf-wrap">
      <embed src="../assets/microprice.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH" type="application/pdf">
      <div class="pdf-ctrl">
        <button class="pdf-ctrl-btn" id="pdf-fs" title="Toggle fullscreen">&#x26F6;</button>
        <span class="pdf-ctrl-sep">|</span>
        <a class="pdf-ctrl-btn" href="../assets/microprice.pdf" download title="Download PDF">&#x2913;</a>
      </div>
    </div>
  </div>

  <script>
    var langEn = document.getElementById('lang-en');
    var langRu = document.getElementById('lang-ru');
    var currentLang = 'en';
    function setLang(lang, save) {
      currentLang = lang;
      document.querySelectorAll('[data-en]').forEach(function (el) {
        el.textContent = el.getAttribute('data-' + lang);
      });
      langEn.classList.toggle('active', lang === 'en');
      langRu.classList.toggle('active', lang === 'ru');
      document.documentElement.lang = lang;
      if (save !== false) {
        try { localStorage.setItem('lang', lang); } catch (e) {}
      }
    }
    try {
      var saved = localStorage.getItem('lang');
      if (saved === 'ru') currentLang = 'ru';
    } catch (e) {}
    setLang(currentLang, false);
    langEn.addEventListener('click', function () { setLang('en'); });
    langRu.addEventListener('click', function () { setLang('ru'); });

    (function () {
      var toggle = document.getElementById('theme-toggle');
      var root = document.documentElement;
      function isDark() {
        var t = root.getAttribute('data-theme');
        if (t) return t === 'dark';
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      try {
        var saved = localStorage.getItem('theme');
        if (saved) root.setAttribute('data-theme', saved);
      } catch (e) {}
      toggle.addEventListener('click', function () {
        var next = isDark() ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();

    (function () {
      var wrap = document.getElementById('pdf-wrap');
      var fsBtn = document.getElementById('pdf-fs');
      if (!wrap || !fsBtn) return;
      function isFs() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement);
      }
      function updateFsIcon() {
        fsBtn.innerHTML = isFs() ? '&#x2715;' : '&#x26F6;';
      }
      fsBtn.addEventListener('click', function () {
        if (!isFs()) {
          (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
      });
      document.addEventListener('fullscreenchange', updateFsIcon);
      document.addEventListener('webkitfullscreenchange', updateFsIcon);
    })();
  </script>
</body>
</html>
